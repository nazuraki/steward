# Example GitHub Actions workflow for running Steward on a schedule.
#
# Copy this file to .github/workflows/steward.yml in the TARGET repo
# (the repo Steward will triage issues and open PRs against).
#
# Required secrets (configure in Settings > Secrets and variables > Actions):
#   ANTHROPIC_API_KEY          - Anthropic API key for Claude
#
# Authentication — choose ONE:
#   Option A (recommended): GitHub App
#     STEWARD_APP_ID              - GitHub App ID
#     STEWARD_APP_PRIVATE_KEY     - GitHub App private key (PEM)
#     STEWARD_APP_INSTALLATION_ID - Installation ID for this repo
#
#   Option B: Personal Access Token
#     STEWARD_PAT                 - PAT with repo scope

name: Steward

on:
  schedule:
    # Run every 15 minutes. Adjust as needed.
    # Note: GitHub may delay scheduled runs during periods of high load.
    - cron: "*/15 * * * *"
  workflow_dispatch: # Allow manual triggers from the Actions tab

# Prevent overlapping runs — only one Steward run at a time.
concurrency:
  group: steward
  cancel-in-progress: false

jobs:
  steward:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Check out the target repo (the one Steward will work on).
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so Steward can create branches

      - uses: nazuraki/steward@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Option A: GitHub App (recommended)
          github_app_id: ${{ secrets.STEWARD_APP_ID }}
          github_app_private_key: ${{ secrets.STEWARD_APP_PRIVATE_KEY }}
          github_app_installation_id: ${{ secrets.STEWARD_APP_INSTALLATION_ID }}

          # Option B: PAT — uncomment and remove the App vars above
          # github_token: ${{ secrets.STEWARD_PAT }}

          # For a GitHub App use "appname[bot]"; for a PAT use the token owner's username.
          bot_username: steward[bot]            # <-- change this
          git_user_name: steward[bot]           # <-- change this
          git_user_email: steward[bot]@users.noreply.github.com  # <-- change this
